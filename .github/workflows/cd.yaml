name: Continuous Delivery of Python package

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
  workflow_dispatch:
    inputs:
      production_release:
        description: "Production release?"
        type: boolean
        required: true
        default: true

concurrency: release

permissions:
  contents: write
  packages: read

jobs:
  ci-check-python:
    name: Check Python
    if: "${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'skip-checks: true') }}"
    uses: ./.github/workflows/check-python.yaml

  ci-check-docs:
    name: Check Documentation
    if: "${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'skip-checks: true') }}"
    uses: ./.github/workflows/check-docs.yaml

  ci-build-python:
    name: Build Python
    uses: ./.github/workflows/build-python.yaml
    needs: [ci-check-python, ci-check-docs]

  # NOTE: sandbox version of upstream cd.yaml:
  #   * uses a personal GitHub App (BOT_ID/BOT_SK) to mirror upstream's release identity
  #   * PyPI -> Test PyPI via OIDC trusted publishing
  release:
    name: Release Library
    needs: ci-build-python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Generate bot token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app_token
        with:
          app-id: ${{ secrets.BOT_ID }}
          private-key: ${{ secrets.BOT_SK }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Fetch entire repository history so we can determine version number from it
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Python environment
        uses: algorandfoundation/algokit-shared-config/.github/actions/setup-algokit-python@main
        with:
          python-version: "3.10"
          install-algokit: "false"

      - name: Get branch name
        shell: bash
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
        id: get_branch

      - name: Set Git user as GitHub actions
        run: git config --global user.email "github-actions[bot]@users.noreply.github.com" && git config --global user.name "github-actions[bot]"

      - name: Create Continuous Deployment - Beta (non-prod)
        id: release-beta
        if: steps.get_branch.outputs.branch == 'main' && !inputs.production_release
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          uv run semantic-release -v version --as-prerelease
          uv run semantic-release publish --tag "$(git describe --tags --abbrev=0)"

      - name: Create Continuous Deployment - Production
        id: release-prod
        if: steps.get_branch.outputs.branch == 'main' && inputs.production_release
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          uv run semantic-release -v version
          uv run semantic-release publish --tag "$(git describe --tags --abbrev=0)"

      - name: Publish package distributions to Test PyPI
        if: |
          (steps.release-beta.outputs.released == 'true') ||
          (steps.release-prod.outputs.released == 'true')
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          verbose: true

  deploy-docs:
    name: Deploy Documentation
    needs: ci-build-python
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-docs
      cancel-in-progress: true
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build documentation
        uses: ./.github/actions/publish-docs

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
